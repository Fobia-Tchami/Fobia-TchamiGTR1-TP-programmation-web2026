<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Contact -    Mon mini-site</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
         <div class="section">
            <h2>Iformations personelles</h2>
            <p>Nom : ...</p>
        </div>
        <p class="highlight">Ce texte est important.</p>
        <h1>Page de contact</h1>
        <nav>
            <a href="index.html">Accueil</a>
            <a href="Presentation.html">Presentation</a>
            <a href="Contact.html">Contact</a>
        </nav>
            <h2>Formulaire de contact</h2>
            <P>veuillerz remplire ce formulaire pour envoyer un message</P>
            <form>
                <label for="nom">Nom :</label>
                <input type="text" id="nom" name="nom" placeholder="Entrer votre nom" required>
                <br>
                <br>
                <label for="prenom">Prenom :</label>
                <input type="text" id="prenom" name="prenom" placeholder="Entrer votre prenom" required>
                <br>
                <br>
                <label for="email"> Address email :</label>
                <input type="email" id="email" name="email" placeholder="exemple@email.com" required>
                <br>
                <br>
                <label for="telephone">Telephone :</label>
                <input type="tel" id="telephone" name="telephone" placeholder="+237 6 xx xx 
                xx xx" required>
                <br>
                <br>
                <label for="message"> Message :</label>
                <br>
                <textarea id="message" name="message" rozs="5" cols="40" 
                placeholder="Ecrivez votre message ici"required></textarea>
                <br>
                <br>
                <label for="motif">Motif du message :</label>
                <select id="motif" name="motif" required>
                    <option value=""></option>
                    <option value="information">Demande d'information</option>
                    <option value="stage">Demand de stage</option>
                    <option value="projet">Proposition de projet</option>
                    <option value="autre">Autre demande</option>
                </select>
                <br>
                <br>
                <p>Statut du visiteur :</p>
                <input type="radio" id="etudiant" name="statut" value="etudiant" required>
                <label for="etudiant">Etudiant</label>
                <br>
                <input type="radio" id="enseignnant" name="statut" value="enseignnant" required>
                <label for="enseignant">Enseignant</label>
                <br>
                <input type="radio" id="professionnel" name="statut" value="professionnel" required>
                <label for="professionnel">Professionnel</label>
                <br>
                <br>
                <input type="checkbox" id="confirmation" name="confirmation" required>
                <label for="confirmation">Je confirme que les informations saisies sont 
                corrects</label>
                <label for="domaine">Domaind</label>
                <select id="domaine" name="domaine" required>
                    <option value=""></option>
                    <option value="reseaux">Reseaux informatiques</option>
                    <option value="cybersecurite">Cybersecurite</option>
                    <option value="developpement-web">Developpement web</option>
                    <option value="administration-system">Administration system</option>
                </select>
                <br>
                <br>
                <button type="submit">Envoyer</button>
                <br>
                <br>
            </form>
    </body>
</html>
